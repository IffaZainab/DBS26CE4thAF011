<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Menu Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Menu Items</h2>

<!-- Add/Edit Form -->
<form th:action="@{/menu/save}" th:object="${menuItem}" method="post" class="card p-3 mb-4">
    <input type="hidden" th:field="*{id}"/>
    <div class="mb-2">
        <input type="text" th:field="*{name}" placeholder="Item Name" class="form-control" required/>
    </div>
    <div class="mb-2">
        <textarea th:field="*{description}" placeholder="Description" class="form-control"></textarea>
    </div>
    <div class="mb-2">
        <input type="number" th:field="*{price}" placeholder="Price" class="form-control" step="0.01" required/>
    </div>
    <div class="mb-2">
        <input type="text" th:field="*{imageUrl}" placeholder="Image URL" class="form-control"/>
    </div>
    <div class="mb-2">
        <label class="form-label fw-bold">Category</label>
        <select class="form-control" name="categoryId">
            <option value="">-- Select Category --</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}"
                    th:selected="${menuItem.category != null && menuItem.category.id == cat.id}">
            </option>
        </select>
    </div>
    <div class="mb-2 form-check">
        <input type="checkbox" th:field="*{available}" class="form-check-input"/>
        <label class="form-check-label">Available</label>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a href="/" class="btn btn-secondary ms-2">Back to Home</a>
</form>

<!-- Items Table -->
<table class="table table-bordered">
    <thead class="table-dark">
    <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Price</th>
        <th>Category</th>
        <th>Available</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${items}">
        <td th:text="${item.name}"></td>
        <td th:text="${item.description}"></td>
        <td th:text="${item.price}"></td>
        <td th:text="${item.category != null ? item.category.name : '-'}"></td>
        <td th:text="${item.available}"></td>
        <td>
            <a th:href="@{/menu/edit/{id}(id=${item.id})}" class="btn btn-primary btn-sm">Edit</a>
            <a th:href="@{/menu/delete/{id}(id=${item.id})}" class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
