<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${category != null ? category.name : 'Menu'}">Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #c0392b !important; }
        .navbar-brand, .nav-link { color: white !important; }
        .item-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .item-card:hover { transform: translateY(-5px); }
        .item-card img { height: 200px; object-fit: cover; width: 100%; }
        .btn-add-cart {
            background-color: #c0392b;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 8px 20px;
            width: 100%;
            cursor: pointer;
        }
        .btn-add-cart:hover { background-color: #a93226; color: white; }
        .price-tag { color: #c0392b; font-weight: bold; font-size: 1.2rem; }
        .cart-icon { position: relative; }
        .cart-badge {
            position: absolute;
            top: -8px; right: -8px;
            background: white; color: #c0392b;
            border-radius: 50%;
            width: 20px; height: 20px;
            font-size: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/"><i class="fas fa-utensils me-2"></i>AMIeats</a>
        <div class="d-flex align-items-center gap-3">
            <a href="/login" class="nav-link"><i class="fas fa-user me-1"></i>Login</a>
            <a href="/cart" class="nav-link cart-icon">
                <i class="fas fa-shopping-cart fs-5"></i>
                <span class="cart-badge" id="cartCount">0</span>
            </a>
        </div>
    </div>
</nav>

<!-- Header -->
<div class="bg-danger text-white py-4 mb-4">
    <div class="container">
        <h2 class="fw-bold mb-0">
            <a href="/" class="text-white me-2"><i class="fas fa-arrow-left"></i></a>
            <span th:text="${category != null ? category.name : 'All Items'}"></span>
        </h2>
    </div>
</div>

<!-- Items Grid -->
<div class="container mb-5">
    <div class="row g-4">
        <div class="col-md-3 col-sm-6" th:each="item : ${items}">
            <div class="item-card card h-100">
                <img th:src="${item.imageUrl}" th:alt="${item.name}"
                     onerror="this.src='https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400'">
                <div class="card-body d-flex flex-column">
                    <h5 class="fw-bold" th:text="${item.name}"></h5>
                    <p class="text-muted small flex-grow-1" th:text="${item.description}"></p>
                    <p class="price-tag">Rs. <span th:text="${item.price}"></span></p>
                    <button class="btn-add-cart"
                            th:data-id="${item.id}"
                            th:data-name="${item.name}"
                            th:data-price="${item.price}"
                            th:data-image="${item.imageUrl}"
                            onclick="addToCart(this)">
                        <i class="fas fa-cart-plus me-2"></i>Add to Cart
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(items)}" class="text-center py-5">
        <i class="fas fa-utensils fa-3x text-muted mb-3"></i>
        <h4 class="text-muted">No items available in this category</h4>
    </div>
</div>

<!-- Toast -->
<div style="position:fixed;bottom:20px;right:20px;z-index:9999;">
    <div id="cartToast" class="toast align-items-center text-white bg-success" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage">Item added to cart!</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="mb-0">© 2026 AMIeats. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        document.getElementById('cartCount').textContent = cart.length;
    }

    function addToCart(btn) {
        const id = parseInt(btn.getAttribute('data-id'));
        const name = btn.getAttribute('data-name');
        const price = parseFloat(btn.getAttribute('data-price'));
        const imageUrl = btn.getAttribute('data-image');

        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({ id, name, price, imageUrl, quantity: 1 });
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();

        document.getElementById('toastMessage').textContent = name + ' added to cart!';
        const toast = new bootstrap.Toast(document.getElementById('cartToast'));
        toast.show();
    }

    updateCartCount();
</script>
</body>
</html>
