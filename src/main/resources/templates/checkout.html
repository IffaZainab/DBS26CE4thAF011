<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AMIeats - Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #c0392b !important; }
        .navbar-brand, .nav-link { color: white !important; }
        .form-card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .place-order-btn { background-color: #c0392b; color: white; border: none; border-radius: 25px; padding: 12px 40px; font-size: 1.1rem; width: 100%; }
        .place-order-btn:hover { background-color: #a93226; }
        .section-title { color: #c0392b; font-weight: bold; border-bottom: 2px solid #c0392b; padding-bottom: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/"><i class="fas fa-utensils me-2"></i>AMIeats</a>
        <a href="/cart" class="nav-link"><i class="fas fa-arrow-left me-1"></i>Back to Cart</a>
    </div>
</nav>

<div class="container my-5">
    <h2 class="fw-bold mb-4"><i class="fas fa-clipboard-list me-2"></i>Checkout</h2>

    <div class="row g-4">
        <!-- Checkout Form -->
        <div class="col-md-7">
            <div class="card form-card p-4">
                <h5 class="section-title">Delivery Information</h5>
                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name *</label>
                    <input type="text" id="custName" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email *</label>
                    <input type="email" id="custEmail" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Phone Number *</label>
                    <input type="tel" id="custPhone" class="form-control" placeholder="03XX-XXXXXXX" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Delivery Address *</label>
                    <textarea id="custAddress" class="form-control" rows="3" placeholder="House #, Street, Area, City"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">City</label>
                    <select id="custCity" class="form-select">
                        <option value="Lahore">Lahore</option>
                        <option value="Karachi">Karachi</option>
                        <option value="Islamabad">Islamabad</option>
                        <option value="Rawalpindi">Rawalpindi</option>
                        <option value="Faisalabad">Faisalabad</option>
                    </select>
                </div>

                <h5 class="section-title mt-4">Payment Method</h5>
                <div class="mb-2">
                    <input type="radio" name="payment" id="cod" value="CASH_ON_DELIVERY" checked>
                    <label for="cod" class="ms-2"><i class="fas fa-money-bill me-1"></i>Cash on Delivery</label>
                </div>
                <div class="mb-2">
                    <input type="radio" name="payment" id="jazzcash" value="JAZZCASH">
                    <label for="jazzcash" class="ms-2"><i class="fas fa-mobile-alt me-1"></i>JazzCash</label>
                </div>
                <div class="mb-2">
                    <input type="radio" name="payment" id="easypaisa" value="EASYPAISA">
                    <label for="easypaisa" class="ms-2"><i class="fas fa-wallet me-1"></i>EasyPaisa</label>
                </div>
                <div class="mb-3">
                    <input type="radio" name="payment" id="card" value="CREDIT_CARD">
                    <label for="card" class="ms-2"><i class="fas fa-credit-card me-1"></i>Credit/Debit Card</label>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Coupon Code (Optional)</label>
                    <div class="input-group">
                        <input type="text" id="couponCode" class="form-control" placeholder="Enter coupon code">
                        <button class="btn btn-outline-danger" onclick="applyCoupon()">Apply</button>
                    </div>
                    <small id="couponMsg" class="text-success"></small>
                </div>

                <button class="place-order-btn mt-3" onclick="placeOrder()">
                    <i class="fas fa-check-circle me-2"></i>Place Order
                </button>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="col-md-5">
            <div class="card form-card p-4">
                <h5 class="section-title">Order Summary</h5>
                <div id="orderItemsList"></div>
                <hr>
                <div class="d-flex justify-content-between mb-2">
                    <span>Subtotal</span>
                    <span id="summarySubtotal">Rs. 0</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span>Delivery</span>
                    <span>Rs. 100</span>
                </div>
                <div class="d-flex justify-content-between mb-2 text-success" id="discountRow" style="display:none!important;">
                    <span>Discount</span>
                    <span id="discountAmount">- Rs. 0</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between fw-bold fs-5">
                    <span>Total</span>
                    <span id="summaryTotal">Rs. 0</span>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="mb-0">© 2026 AMIeats. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let discount = 0;

    function renderSummary() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let subtotal = 0;
        let html = '';
        cart.forEach(item => {
            subtotal += item.price * item.quantity;
            html += `<div class="d-flex justify-content-between mb-2">
                <span>${item.name} x${item.quantity}</span>
                <span>Rs. ${item.price * item.quantity}</span>
            </div>`;
        });
        document.getElementById('orderItemsList').innerHTML = html;
        document.getElementById('summarySubtotal').textContent = 'Rs. ' + subtotal;
        document.getElementById('summaryTotal').textContent = 'Rs. ' + (subtotal + 100 - discount);
    }

    function applyCoupon() {
        const code = document.getElementById('couponCode').value.trim();
        fetch('/order/apply-coupon?code=' + code)
            .then(res => res.json())
            .then(data => {
                if (data.valid) {
                    discount = data.discountAmount;
                    document.getElementById('couponMsg').textContent = 'Coupon applied! ' + data.discountPercent + '% off';
                    document.getElementById('discountAmount').textContent = '- Rs. ' + discount;
                    document.getElementById('discountRow').style.display = 'flex';
                    renderSummary();
                } else {
                    document.getElementById('couponMsg').textContent = 'Invalid coupon code';
                    document.getElementById('couponMsg').className = 'text-danger';
                }
            });
    }

    function placeOrder() {
        const name = document.getElementById('custName').value.trim();
        const email = document.getElementById('custEmail').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const address = document.getElementById('custAddress').value.trim();
        const city = document.getElementById('custCity').value;
        const payment = document.querySelector('input[name="payment"]:checked').value;
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');

        if (!name || !email || !phone || !address) {
            alert('Please fill all required fields!');
            return;
        }
        if (cart.length === 0) {
            alert('Cart khali hai!');
            return;
        }

        const orderData = {
            customerName: name,
            customerEmail: email,
            phone: phone,
            deliveryAddress: address + ', ' + city,
            paymentMethod: payment,
            items: cart
        };

        fetch('/order/place', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(orderData)
        })
        .then(res => res.json())
        .then(data => {
            localStorage.removeItem('cart');
            window.location.href = '/order/confirmation/' + data.orderNumber;
        })
        .catch(err => alert('Error placing order: ' + err));
    }

    renderSummary();
</script>
</body>
</html>
