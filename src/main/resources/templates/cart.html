<!DOCTYPE html>
<html>
<head>
    <title>AMIeats - Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #c0392b !important; }
        .navbar-brand, .nav-link { color: white !important; }
        .cart-item-img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; }
        .qty-btn { background: #c0392b; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; }
        .checkout-btn { background-color: #c0392b; color: white; border: none; border-radius: 25px; padding: 12px 40px; font-size: 1.1rem; }
        .checkout-btn:hover { background-color: #a93226; color: white; }
        .summary-card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/"><i class="fas fa-utensils me-2"></i>AMIeats</a>
        <div class="d-flex align-items-center gap-3">
            <a href="/" class="nav-link"><i class="fas fa-arrow-left me-1"></i>Back to Menu</a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <h2 class="fw-bold mb-4"><i class="fas fa-shopping-cart me-2"></i>Your Cart</h2>

    <div class="row g-4">
        <!-- Cart Items -->
        <div class="col-md-8">
            <div id="cartItems">
                <!-- filled by JS -->
            </div>
            <div id="emptyCart" class="text-center py-5" style="display:none;">
                <i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i>
                <h4 class="text-muted">Your cart is empty</h4>
                <a href="/" class="btn btn-danger mt-3">Browse Menu</a>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="col-md-4">
            <div class="card summary-card p-4">
                <h5 class="fw-bold mb-3">Order Summary</h5>
                <div class="d-flex justify-content-between mb-2">
                    <span>Subtotal</span>
                    <span id="subtotal">Rs. 0</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span>Delivery</span>
                    <span>Rs. 100</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between fw-bold fs-5">
                    <span>Total</span>
                    <span id="total">Rs. 100</span>
                </div>
                <button class="checkout-btn w-100 mt-4" onclick="proceedToCheckout()">
                    Proceed to Checkout
                </button>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="mb-0">© 2026 AMIeats. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function renderCart() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const container = document.getElementById('cartItems');
        const emptyDiv = document.getElementById('emptyCart');

        if (cart.length === 0) {
            container.style.display = 'none';
            emptyDiv.style.display = 'block';
            document.getElementById('subtotal').textContent = 'Rs. 0';
            document.getElementById('total').textContent = 'Rs. 100';
            return;
        }

        emptyDiv.style.display = 'none';
        container.style.display = 'block';

        let html = '';
        let subtotal = 0;

        cart.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            subtotal += itemTotal;
            html += `
                <div class="card mb-3 border-0 shadow-sm p-3">
                    <div class="d-flex align-items-center gap-3">
                        <img src="${item.imageUrl || 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400'}"
                             class="cart-item-img"
                             onerror="this.src='https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400'">
                        <div class="flex-grow-1">
                            <h6 class="fw-bold mb-1">${item.name}</h6>
                            <p class="text-danger fw-bold mb-0">Rs. ${item.price}</p>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <button class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
                            <span class="fw-bold">${item.quantity}</span>
                            <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                        </div>
                        <div class="text-end ms-3">
                            <p class="fw-bold mb-0">Rs. ${itemTotal}</p>
                            <button class="btn btn-sm btn-outline-danger mt-1" onclick="removeItem(${index})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
        });

        container.innerHTML = html;
        document.getElementById('subtotal').textContent = 'Rs. ' + subtotal;
        document.getElementById('total').textContent = 'Rs. ' + (subtotal + 100);
    }

    function changeQty(index, delta) {
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        cart[index].quantity += delta;
        if (cart[index].quantity <= 0) cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }

    function proceedToCheckout() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        if (cart.length === 0) {
            alert('Cart khali hai!');
            return;
        }
        window.location.href = '/checkout';
    }

    renderCart();
</script>
</body>
</html>
