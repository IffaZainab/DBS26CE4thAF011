<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AMIeats - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .sidebar {
            background-color: #2c3e50;
            min-height: 100vh;
            padding: 20px 0;
        }
        .sidebar a {
            color: #bdc3c7;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
        }
        .sidebar a:hover, .sidebar a.active { background: #c0392b; color: white; }
        .sidebar .brand { color: white; font-size: 1.3rem; font-weight: bold; padding: 15px 20px 25px; border-bottom: 1px solid #34495e; }
        .stat-card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .stat-icon { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .main-content { padding: 30px; }
    </style>
</head>
<body>
<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar" style="width: 250px; min-width: 250px;">
        <div class="brand"><i class="fas fa-utensils me-2"></i>AMIeats Admin</div>
        <a href="/admin/dashboard" class="active"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
        <a href="/admin/orders"><i class="fas fa-shopping-bag me-2"></i>Orders</a>
        <a href="/admin/customers"><i class="fas fa-users me-2"></i>Customers</a>
        <a href="/menu"><i class="fas fa-utensils me-2"></i>Menu Items</a>
        <a href="/reports"><i class="fas fa-chart-bar me-2"></i>Reports</a>
        <a href="/"><i class="fas fa-globe me-2"></i>View Website</a>
        <a href="/login"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 main-content">
        <h3 class="fw-bold mb-4">Dashboard</h3>

        <!-- Stats -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card stat-card p-4">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon bg-danger bg-opacity-10">
                            <i class="fas fa-shopping-bag fa-lg text-danger"></i>
                        </div>
                        <div>
                            <p class="text-muted mb-0 small">Total Orders</p>
                            <h3 class="fw-bold mb-0" th:text="${totalOrders}">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card p-4">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon bg-success bg-opacity-10">
                            <i class="fas fa-users fa-lg text-success"></i>
                        </div>
                        <div>
                            <p class="text-muted mb-0 small">Total Customers</p>
                            <h3 class="fw-bold mb-0" th:text="${totalCustomers}">0</h3>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card p-4">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon bg-warning bg-opacity-10">
                            <i class="fas fa-utensils fa-lg text-warning"></i>
                        </div>
                        <div>
                            <p class="text-muted mb-0 small">Menu Items</p>
                            <h3 class="fw-bold mb-0" th:text="${totalItems}">0</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Orders -->
        <div class="card stat-card p-4">
            <h5 class="fw-bold mb-3">Recent Orders</h5>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-dark">
                    <tr>
                        <th>Order #</th>
                        <th>Customer</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${recentOrders}">
                        <td th:text="${order.orderNumber}"></td>
                        <td th:text="${order.customer.name}"></td>
                        <td>Rs. <span th:text="${order.totalAmount}"></span></td>
                        <td>
                                <span class="badge"
                                      th:classappend="${order.status == T(com.restaurant.restaurant_management.model.Order.OrderStatus).PENDING ? 'bg-warning text-dark' :
                                                       order.status == T(com.restaurant.restaurant_management.model.Order.OrderStatus).DELIVERED ? 'bg-success' : 'bg-info'}"
                                      th:text="${order.status}"></span>
                        </td>
                        <td th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
