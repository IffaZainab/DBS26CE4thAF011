<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AMIeats - Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .sidebar { background-color: #2c3e50; min-height: 100vh; padding: 20px 0; }
        .sidebar a { color: #bdc3c7; display: block; padding: 12px 20px; text-decoration: none; }
        .sidebar a:hover, .sidebar a.active { background: #c0392b; color: white; }
        .sidebar .brand { color: white; font-size: 1.3rem; font-weight: bold; padding: 15px 20px 25px; border-bottom: 1px solid #34495e; }
        .main-content { padding: 30px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar" style="width:250px; min-width:250px;">
        <div class="brand"><i class="fas fa-utensils me-2"></i>AMIeats Admin</div>
        <a href="/admin/dashboard"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
        <a href="/admin/orders" class="active"><i class="fas fa-shopping-bag me-2"></i>Orders</a>
        <a href="/admin/customers"><i class="fas fa-users me-2"></i>Customers</a>
        <a href="/menu"><i class="fas fa-utensils me-2"></i>Menu Items</a>
        <a href="/reports"><i class="fas fa-chart-bar me-2"></i>Reports</a>
        <a href="/"><i class="fas fa-globe me-2"></i>View Website</a>
        <a href="/login"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
    </div>

    <div class="flex-grow-1 main-content">
        <h3 class="fw-bold mb-4">All Orders</h3>
        <div class="card p-4">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-dark">
                    <tr>
                        <th>Order #</th>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Address</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.orderNumber}"></td>
                        <td th:text="${order.customer.name}"></td>
                        <td th:text="${order.phone}"></td>
                        <td th:text="${order.deliveryAddress}"></td>
                        <td>Rs. <span th:text="${order.totalAmount}"></span></td>
                        <td>
                                <span class="badge"
                                      th:classappend="${order.status.name() == 'PENDING' ? 'bg-warning text-dark' :
                                                       order.status.name() == 'DELIVERED' ? 'bg-success' :
                                                       order.status.name() == 'CONFIRMED' ? 'bg-info' :
                                                       order.status.name() == 'PREPARING' ? 'bg-primary' : 'bg-danger'}"
                                      th:text="${order.status}">
                                </span>
                        </td>
                        <td th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy')}"></td>
                        <td>
                            <div class="dropdown">
                                <button class="btn btn-sm btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
                                    Update
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" th:href="@{/admin/orders/update/{id}/CONFIRMED(id=${order.id})}">Confirm</a></li>
                                    <li><a class="dropdown-item" th:href="@{/admin/orders/update/{id}/PREPARING(id=${order.id})}">Preparing</a></li>
                                    <li><a class="dropdown-item" th:href="@{/admin/orders/update/{id}/DELIVERED(id=${order.id})}">Delivered</a></li>
                                    <li><a class="dropdown-item text-danger" th:href="@{/admin/orders/update/{id}/CANCELLED(id=${order.id})}">Cancel</a></li>
                                </ul>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
