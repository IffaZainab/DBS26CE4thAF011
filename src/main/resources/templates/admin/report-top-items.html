<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AMIeats - Top Items Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .sidebar { background-color: #2c3e50; min-height: 100vh; padding: 20px 0; }
        .sidebar a { color: #bdc3c7; display: block; padding: 12px 20px; text-decoration: none; }
        .sidebar a:hover, .sidebar a.active { background: #c0392b; color: white; }
        .sidebar .brand { color: white; font-size: 1.3rem; font-weight: bold; padding: 15px 20px 25px; border-bottom: 1px solid #34495e; }
        .main-content { padding: 30px; }
        .form-card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.08); max-width: 500px; }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar" style="width:250px; min-width:250px;">
        <div class="brand"><i class="fas fa-utensils me-2"></i>AMIeats Admin</div>
        <a href="/admin/dashboard"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
        <a href="/admin/orders"><i class="fas fa-shopping-bag me-2"></i>Orders</a>
        <a href="/admin/customers"><i class="fas fa-users me-2"></i>Customers</a>
        <a href="/menu"><i class="fas fa-utensils me-2"></i>Menu Items</a>
        <a href="/reports" class="active"><i class="fas fa-chart-bar me-2"></i>Reports</a>
        <a href="/"><i class="fas fa-globe me-2"></i>View Website</a>
        <a href="/login"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
    </div>

    <div class="flex-grow-1 main-content">
        <h3 class="fw-bold mb-4"><i class="fas fa-star me-2"></i>Top Selling Items Report</h3>
        <div class="card form-card p-4">
            <p class="text-muted mb-4">Enter how many top items you want to see.</p>
            <form action="/reports/top-items/generate" method="get" target="_blank">
                <div class="mb-3">
                    <label class="form-label fw-bold">Number of Top Items</label>
                    <select name="topN" class="form-select">
                        <option value="5">Top 5</option>
                        <option value="10" selected>Top 10</option>
                        <option value="15">Top 15</option>
                        <option value="20">Top 20</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-danger w-100">
                    <i class="fas fa-file-alt me-2"></i>Generate Report
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
