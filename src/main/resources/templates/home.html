<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AMIeats - Order Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #c0392b !important; }
        .navbar-brand, .nav-link { color: white !important; }
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
            url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1200');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 0;
            text-align: center;
        }
        .category-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .category-card:hover { transform: translateY(-5px); }
        .category-card img {
            height: 200px;
            object-fit: cover;
            width: 100%;
        }
        .category-card .card-body {
            background: #c0392b;
            color: white;
            text-align: center;
            padding: 15px;
        }
        .cart-icon { position: relative; }
        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: white;
            color: #c0392b;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/"><i class="fas fa-utensils me-2"></i>AMIeats</a>
        <div class="d-flex align-items-center gap-3">
            <a href="/login" class="nav-link"><i class="fas fa-user me-1"></i>Login</a>
            <a href="/cart" class="nav-link cart-icon">
                <i class="fas fa-shopping-cart fs-5"></i>
                <span class="cart-badge" id="cartCount">0</span>
            </a>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<div class="hero">
    <div class="container">
        <h1 class="display-4 fw-bold mb-3">Delicious Food, Delivered Fast</h1>
        <p class="lead mb-4">Order from your favorite restaurant right to your doorstep</p>
        <a href="#categories" class="btn btn-danger btn-lg px-5">Order Now</a>
    </div>
</div>

<!-- Categories Section -->
<div class="container my-5" id="categories">
    <h2 class="text-center fw-bold mb-4">Our Menu Categories</h2>
    <div class="row g-4">
        <div class="col-md-3 col-sm-6" th:each="category : ${categories}">
            <a th:href="@{/menu/category/{id}(id=${category.id})}" class="text-decoration-none">
                <div class="category-card card">
                    <img th:src="${category.imageUrl}" th:alt="${category.name}"
                         onerror="this.src='https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400'">
                    <div class="card-body">
                        <h5 class="mb-0 fw-bold" th:text="${category.name}"></h5>
                        <small th:text="${category.description}"></small>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="mb-0">© 2026 AMIeats. All rights reserved.</p>
</footer>

<script>
    // Cart count from localStorage
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    document.getElementById('cartCount').textContent = cart.length;
</script>

</body>
</html>
